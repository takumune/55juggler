name: Deploy to GitHub Pages

on:
  # mainブランチにpushされたら実行
  push:
    branches:
      - main
  # 手動実行の許可
  workflow_dispatch:

# GITHUB_TOKEN の権限を設定してGitHub Pagesへのデプロイを許可
permissions:
  contents: read
  pages: write
  id-token: write

# 複数同時デプロイを防止する設定（新しいデプロイが開始されたら進行中のものをキャンセル）
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # デプロイジョブ
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # package-lock.json に基づいて依存パッケージをインストール
      - name: Install dependencies
        run: npm ci

      # プロジェクトのビルド (Viteの場合、distディレクトリが出力される)
      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # ビルドされた成果物 (dist ディレクトリ) をアップロード
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      # GitHub Pages に展開
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
