<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:," />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>55juggler</title>
</head>

<body>
  <div class="wrapper">
    <div id="instructions">
      <p><strong>「 操作方法 」</strong></p>
      <p><kbd>↑</kbd>：メダル追加 (50枚)</p>
      <p><kbd>Space</kbd>：オートBET &amp; 回転 &amp; 順押ST</p>
      <p><kbd>Enter</kbd>：手動BET</p>
      <p><kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd>：手動ST</p>
      <p style="margin-top: 10px;">
        設定変更: 
        <select id="setting-select" style="background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 2px 4px;">
          <option value="1">設定1</option>
          <option value="2">設定2</option>
          <option value="3">設定3</option>
          <option value="4">設定4</option>
          <option value="5">設定5</option>
          <option value="6" selected>設定6</option>
        </select>
      </p>
      <p style="margin-top: 8px; border-top: 1px solid #333; padding-top: 8px;">
        <kbd>0</kbd>：強制ペカ
      </p>
      <p>
        <label><input type="checkbox" id="wait-toggle" checked> ウェイト有効</label>
      </p>
      <p>
        <label><input type="checkbox" id="assist-toggle"> 目押し補助(強制)有効</label>
      </p>
    </div>

    <div id="machine-wrapper">
      <img id="kyotai-img" src="/img/kyutai2.png" alt="slot machine" />
      <div id="app"></div>

      <!-- UI (キャンバス外に配置) -->
      <div id="bonus-lamp-container">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="puzzle-lamp-svg">
          <defs>
            <!-- 基本となるパズルのピース形状 -->
            <path id="jigsaw" d="M -20,-20 
                     L -6,-20 A 7,7 0 1,1 6,-20 L 20,-20 
                     L 20,-6 A 7,7 0 1,0 20,6 L 20,20 
                     L 6,20 A 7,7 0 1,1 -6,20 L -20,20 
                     L -20,6 A 7,7 0 1,0 -20,-6 Z" />
          </defs>
          <g transform="translate(0, 100) scale(1, -1)">
            <g transform="scale(0.8) translate(15, 15) rotate(-25, 55, 55)">
              <!-- ピース1 (左上): 黄緑色 -->
              <use href="#jigsaw" transform="translate(35, 35)" class="piece1" />
              <!-- ピース3 (右上): 中間緑（ピース1の右に結合） -->
              <use href="#jigsaw" transform="translate(75, 35) rotate(-90)" class="piece3" />
              <!-- ピース2 (左下): 深緑色（ピース1の下に結合） -->
              <use href="#jigsaw" transform="translate(35, 75) rotate(90)" class="piece2" />
            </g>
          </g>
        </svg>
      </div>

      <div class="digital-display" id="bonus-pay-display" style="display: none;"></div>

      <!-- LEDセグメント風デジタル表示パネル（位置はCSSで個別調整） -->
      <div class="led-panel" id="led-credit">
        <span class="led-value" id="led-credit-val">00</span>
      </div>
      <div class="led-panel" id="led-count">
        <span class="led-value" id="led-count-val">000</span>
      </div>
      <div class="led-panel" id="led-payout">
        <span class="led-value" id="led-payout-val">00</span>
      </div>
    </div>

    <!-- データカウンター（台右側） -->
    <div id="data-counter">
      <div class="dc-title">DATA COUNTER</div>
      <div class="dc-row">
        <span class="dc-label">TOTAL</span>
        <span class="dc-value" id="dc-total">0000</span>
      </div>
      <div class="dc-row">
        <span class="dc-label">G</span>
        <span class="dc-value" id="dc-games">000</span>
      </div>
      <div class="dc-row">
        <span class="dc-label">BB</span>
        <span class="dc-value" id="dc-bb">00</span>
      </div>
      <div class="dc-row">
        <span class="dc-label">RB</span>
        <span class="dc-value" id="dc-rb">00</span>
      </div>
      <div class="dc-row">
        <span class="dc-label">DIFF</span>
        <span class="dc-value" id="dc-diff">+0000</span>
      </div>
      <div class="dc-row" style="border-top: 1px solid #1a1a1a; margin-top: 8px; padding-top: 4px;">
        <span class="dc-label">CREDIT</span>
        <span class="dc-value" id="dc-credits">0000</span>
      </div>
      <!-- スランプグラフ -->
      <canvas id="slump-graph" width="180" height="250"></canvas>
      
      <!-- 成立役履歴 -->
      <div id="win-history-container">
        <div class="dc-title" style="margin-top: 10px;">HISTORY</div>
        <div id="win-history-list"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
