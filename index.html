<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:," />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>55juggler</title>
</head>

<body>
  <div class="wrapper">
    <div id="machine-wrapper">
      <img id="kyotai-img" src="/img/kyutai2.png" alt="slot machine" />
      <div id="app"></div>

      <!-- UI (キャンバス外に配置) -->
      <div id="bonus-lamp-container">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="puzzle-lamp-svg">
          <defs>
            <!-- 基本となるパズルのピース形状 -->
            <path id="jigsaw" d="M -20,-20 
                     L -6,-20 A 7,7 0 1,1 6,-20 L 20,-20 
                     L 20,-6 A 7,7 0 1,0 20,6 L 20,20 
                     L 6,20 A 7,7 0 1,1 -6,20 L -20,20 
                     L -20,6 A 7,7 0 1,0 -20,-6 Z" />
          </defs>
          <g transform="translate(0, 100) scale(1, -1)">
            <g transform="scale(0.8) translate(15, 15) rotate(-25, 55, 55)">
              <!-- ピース1 (左上): 黄緑色 -->
              <use href="#jigsaw" transform="translate(35, 35)" class="piece1" />
              <!-- ピース3 (右上): 中間緑（ピース1の右に結合） -->
              <use href="#jigsaw" transform="translate(75, 35) rotate(-90)" class="piece3" />
              <!-- ピース2 (左下): 深緑色（ピース1の下に結合） -->
              <use href="#jigsaw" transform="translate(35, 75) rotate(90)" class="piece2" />
            </g>
          </g>
        </svg>
      </div>
      <div class="digital-display" id="credit-display">CREDIT: 0</div>
      <div class="digital-display" id="pay-display">PAY: 0</div>
      <div class="digital-display" id="bet-display">BET: 0</div>
      <div class="digital-display" id="setting-display">SETTING: 6</div>
      <div class="digital-display" id="bonus-pay-display" style="display: none;"></div>
    </div>
    <div id="instructions">
      <p><strong>【 操作方法 】</strong></p>
      <p>
        <kbd>↑</kbd>：メダル追加 (50枚)&nbsp;&nbsp;|&nbsp;&nbsp;
        <kbd>Space</kbd>：オートBET ＆ 回転 ＆ 順押しストップ
      </p>
      <p>
        <kbd>Enter</kbd>：手動BET&nbsp;&nbsp;|&nbsp;&nbsp;
        <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd>：手動ストップ&nbsp;&nbsp;|&nbsp;&nbsp;
        <kbd>s</kbd>：設定変更 (1〜6, X)
      </p>
      <p style="font-size: 11px; margin-top: 5px; color: #888;">
        <kbd>0</kbd>：強制ペカ
        &nbsp;&nbsp;|&nbsp;&nbsp;
        <label><input type="checkbox" id="wait-toggle" checked> ウェイト有効</label>
        &nbsp;&nbsp;|&nbsp;&nbsp;
        <label><input type="checkbox" id="assist-toggle"> 目押し補助(強制)有効</label>
      </p>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
